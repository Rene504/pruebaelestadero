<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="El Estadero Restaurant — Menú. Cortes ANGUS, parrilladas, mariscos y más. Comayagua, Honduras." />
  <meta name="theme-color" content="#0d0b08" />
  <title>El Estadero — Menú</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ══════════════════════════════════════
       INTRO SPLASH
  ══════════════════════════════════════════ -->
  <div id="intro" aria-hidden="true">
    <div class="intro-ring">
      <span class="intro-icon">🍽️</span>
    </div>
    <p class="intro-name">El Estadero</p>
    <p class="intro-sub">Restaurant &nbsp;·&nbsp; Comayagua</p>
    <div class="intro-bar"></div>
    <button class="intro-skip" id="skip-btn">Ver Menú</button>
  </div>

  <!-- ══════════════════════════════════════
       APP SHELL
  ══════════════════════════════════════════ -->
  <div id="app">

    <!-- ── Navbar ── -->
    <nav id="navbar">
      <div class="nav-brand">
        El Estadero
        <small>Restaurant</small>
      </div>

      <div class="nav-actions">
        <!-- Info button -->
        <button id="info-btn" aria-label="Información del restaurante">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Info
        </button>

        <!-- Hamburger -->
        <button id="menu-toggle" aria-label="Categorías" aria-expanded="false" aria-controls="side-drawer">
          <span class="ham-line"></span>
          <span class="ham-line"></span>
          <span class="ham-line"></span>
        </button>
      </div>
    </nav>

    <!-- ── Tab bar ── -->
    <div id="tab-bar" role="tablist" aria-label="Categorías del menú">
      <!-- JS inserts tab buttons -->
    </div>

    <!-- ── Menu panel ── -->
    <main id="menu-panel">
      <!-- JS inserts category panels -->
    </main>

  </div><!-- /app -->

  <!-- ══════════════════════════════════════
       DRAWER OVERLAY + SIDE DRAWER
  ══════════════════════════════════════════ -->
  <div id="drawer-overlay"></div>

  <aside id="side-drawer" aria-label="Navegación de categorías">
    <div class="drawer-head">
      <span>Categorías</span>
    </div>
    <nav class="drawer-nav" id="drawer-nav">
      <!-- JS inserts nav buttons -->
    </nav>
  </aside>

  <!-- ══════════════════════════════════════
       INFO MODAL
  ══════════════════════════════════════════ -->
  <div id="info-overlay" role="dialog" aria-modal="true" aria-label="Información del restaurante">
    <div class="info-modal">

      <div class="info-modal-head">
        <h3>El Estadero</h3>
        <button class="info-close" id="info-close" aria-label="Cerrar">✕</button>
      </div>

      <div class="info-body">
        <div class="info-row">
          <span class="info-row-icon">📞</span>
          <div class="info-row-text">
            <span class="info-row-label">Teléfono</span>
            <a href="tel:32448155" id="info-phone-link">3244-8155</a>
          </div>
        </div>

        <div class="info-row">
          <span class="info-row-icon">📍</span>
          <div class="info-row-text">
            <span class="info-row-label">Ubicación</span>
            <span id="info-address">Plaza Mayor de la Catedral, Comayagua.</span>
          </div>
        </div>

        <div class="info-row">
          <span class="info-row-icon">📸</span>
          <div class="info-row-text">
            <span class="info-row-label">Instagram</span>
            <a href="#" id="info-ig-link" target="_blank" rel="noopener">@elestaderohn</a>
          </div>
        </div>

        <div class="info-row">
          <span class="info-row-icon">👍</span>
          <div class="info-row-text">
            <span class="info-row-label">Facebook</span>
            <a href="#" id="info-fb-link" target="_blank" rel="noopener">@elestaderohn</a>
          </div>
        </div>

        <div class="info-row">
          <span class="info-row-icon">🛵</span>
          <div class="info-row-text">
            <span class="info-row-label">Delivery</span>
            Servicio a domicilio disponible
          </div>
        </div>
      </div>

      <div class="info-actions">
        <a href="tel:32448155" class="info-btn-call" id="info-phone">
          📞 Llamar
        </a>
        <a href="#" class="info-btn-wa" id="info-wa-link" target="_blank" rel="noopener">
          💬 WhatsApp
        </a>
      </div>

    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
